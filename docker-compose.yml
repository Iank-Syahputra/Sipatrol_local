services:
  fix-volume-permissions:
    image: alpine
    container_name: sipatrol-fix-perms
    volumes:
      - uploads_data:/app/public/uploads
    command: sh -c "mkdir -p /app/public/uploads/evidence && chown -R 1001:1001 /app/public/uploads"

  db:
    image: mariadb:10
    container_name: sipatrol-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sipatrol_db}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sipatrol-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sipatrol-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/${MYSQL_DATABASE:-sipatrol_db}
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DATABASE_NAME: ${MYSQL_DATABASE:-sipatrol_db}
      GROQ_API_KEY: ${GROQ_API_KEY}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-llama-3.3-70b-versatile}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      READ_ONLY_DATABASE_URL: ${READ_ONLY_DATABASE_URL}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      fix-volume-permissions:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - sipatrol-network

volumes:
  mysql_data:
  uploads_data:

networks:
  sipatrol-network:
    driver: bridge
